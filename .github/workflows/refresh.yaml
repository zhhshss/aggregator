name: Refresh
on:
  schedule:
    - cron: "20 */6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-refresh
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  GIST_PAT: ${{ secrets.GIST_PAT }}
  GIST_LINK: ${{ secrets.GIST_LINK }}
  CUSTOMIZE_LINK: ${{ secrets.CUSTOMIZE_LINK }}
  ENABLE_SPECIAL_PROTOCOLS: ${{ vars.ENABLE_SPECIAL_PROTOCOLS }}
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_PREFIX: ${{ secrets.R2_PREFIX }}
  R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"

      - name: Install
        run: pip3 install -r requirements.txt

      - name: Check secrets
        run: |
          if [ -z "$GIST_PAT" ]; then
              echo "Error: secret GIST_PAT cannot be empty"
              exit 1
          fi
          if [ -z "$GIST_LINK" ]; then
              echo "Error: secret GIST_LINK cannot be empty"
              exit 1
          fi
          LINK_PARTS=$(echo "$GIST_LINK" | awk -F'/' 'NF==2 && $1!="" && $2!=""')
          if [ -z "$LINK_PARTS" ]; then
              echo "Error: secret GIST_LINK must be username/gist_id"
              exit 1
          fi

      - name: Refresh
        run: python -u subscribe/collect.py --all --refresh --overwrite --skip -t clash v2ray singbox -n 32

      - name: Split mainstream airports
        run: |
          python -u scripts/split_mainstream.py \
            -g "$GIST_LINK" \
            -k "$GIST_PAT" \
            -i data/clash.yaml \
            -b data/mainstream_brands.txt

      - name: Upload to Cloudflare R2
        if: ${{ env.R2_ENDPOINT != '' && env.R2_ACCESS_KEY_ID != '' && env.R2_SECRET_ACCESS_KEY != '' }}
        run: |
          python -u scripts/upload_r2.py \
            --endpoint "$R2_ENDPOINT" \
            --access-key "$R2_ACCESS_KEY_ID" \
            --secret-key "$R2_SECRET_ACCESS_KEY" \
            --bucket "${R2_BUCKET:-aggregator}" \
            --prefix "${R2_PREFIX:-}" \
            --public-base "${R2_PUBLIC_BASE:-}" \
            --dir data

      - name: Timestamp
        run: date
